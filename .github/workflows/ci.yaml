name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Formatting
        run: mvn spotless:check

      - name: Test
        run: mvn test -pl war-rest,example/javascript -am

      - name: Build with Maven
        run: mvn clean package -pl war-rest,example/javascript -am -DskipTests

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            war-rest/target/kagura.war
            example/javascript/target/javascript.war
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
