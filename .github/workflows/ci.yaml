name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-beta*'
      - 'test-*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - lint-fix
          - build
          - release-snapshot
          - release
          - monthly-maintenance
      release_mode:
        description: "Release mode"
        required: false
        default: "snapshot"
        type: choice
        options: [snapshot, release]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write

jobs:
  route:
    name: Route event
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_release: ${{ steps.route.outputs.run_release }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail

          run_code_checks=false
          run_release=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                run_release=true
              fi
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" != "closed" ]]; then
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == "release" || "${{ inputs.mode }}" == "release-snapshot" ]]; then
                run_release=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"

  java-build-test:
    name: Java Build & Test
    needs: route
    if: ${{ needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Formatting
        run: mvn spotless:check

      - name: Test
        run: mvn test -pl war-rest,example/javascript -am

  release:
    name: Build & Release Artifacts
    needs: [route, java-build-test]
    if: ${{ always() && needs.route.outputs.run_release == 'true' && (needs.java-build-test.result == 'success' || needs.java-build-test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Packages
        run: mvn clean package -pl war-rest,example/javascript -am -DskipTests

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            war-rest/target/kagura.war
            example/javascript/target/javascript.war
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
