name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-beta*'
      - 'test-*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - release
      increment:
        description: "Version increment type"
        required: false
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
          - none

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write
  pages: write
  id-token: write

jobs:
  route:
    name: Route event
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_release: ${{ steps.route.outputs.run_release }}
      run_pages: ${{ steps.route.outputs.run_pages }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail

          run_code_checks=false
          run_release=false
          run_pages=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                run_release=true
                run_pages=true
              fi
              if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
                run_pages=true
              fi
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" != "closed" ]]; then
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == "release" ]]; then
                run_release=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "run_pages=$run_pages" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover capabilities and cost profile
    needs: route
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
      has_java: ${{ steps.detect.outputs.has_java }}
      has_hugo: ${{ steps.detect.outputs.has_hugo }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          [[ -f pom.xml ]] && echo "has_java=true" >> "$GITHUB_OUTPUT" || echo "has_java=false" >> "$GITHUB_OUTPUT"
          [[ -d site/mydocs ]] && echo "has_hugo=true" >> "$GITHUB_OUTPUT" || echo "has_hugo=false" >> "$GITHUB_OUTPUT"

      - id: profile
        shell: bash
        run: |
          set -euo pipefail
          # repo visibility is authoritative
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            echo "profile=private" >> "$GITHUB_OUTPUT"
          else
            echo "profile=public" >> "$GITHUB_OUTPUT"
          fi

  java-build-test:
    name: Java Build & Test
    needs: [route, discover]
    if: ${{ needs.discover.outputs.has_java == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Formatting
        run: mvn spotless:check

      - name: Test
        run: mvn test -pl war-rest,example/javascript -am

  release:
    name: Build & Release Artifacts
    needs: [route, discover, java-build-test]
    if: ${{ always() && needs.discover.outputs.has_java == 'true' && needs.route.outputs.run_release == 'true' && (needs.java-build-test.result == 'success' || needs.java-build-test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prepare Version and Tag
        id: prep_version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" == "release" ]]; then
            # Extract current version from root POM
            CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            BASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
            IFS='.' read -r -a PARTS <<< "$BASE_VERSION"
            MAJOR=${PARTS[0]:-0}
            MINOR=${PARTS[1]:-0}
            PATCH=${PARTS[2]:-0}

            INCREMENT="${{ inputs.increment }}"

            if [ "$INCREMENT" == "major" ]; then
              NEW_VERSION="$((MAJOR + 1)).0.0"
            elif [ "$INCREMENT" == "minor" ]; then
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            elif [ "$INCREMENT" == "patch" ]; then
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            elif [ "$INCREMENT" == "none" ]; then
              NEW_VERSION="$BASE_VERSION"
            else
              NEW_VERSION="$BASE_VERSION"
            fi

            IFS='.' read -r -a NEW_PARTS <<< "${NEW_VERSION%-*}"
            N_MAJOR=${NEW_PARTS[0]:-0}
            N_MINOR=${NEW_PARTS[1]:-0}
            N_PATCH=${NEW_PARTS[2]:-0}
            NEXT_VERSION="$N_MAJOR.$N_MINOR.$((N_PATCH + 1))-SNAPSHOT"

            echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "TAG_NAME=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

            # Setup Git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            # Update Maven version
            mvn versions:set -DnewVersion="$NEW_VERSION" -DgenerateBackupPoms=false

            # Commit and Tag
            git commit -am "Release $NEW_VERSION"
            git tag "v$NEW_VERSION"

            # Push tag
            git push origin "v$NEW_VERSION"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "TAG_NAME=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Packages
        run: mvn clean package -pl war-rest,example/javascript -am -DskipTests

      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep_version.outputs.TAG_NAME }}
          files: |
            war-rest/target/kagura.war
            example/javascript/target/javascript.war
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Next Version PR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.prep_version.outputs.NEXT_VERSION }}"
          NEW_BRANCH="bump-version-$NEXT_VERSION"

          # Setup Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and update POMs
          git checkout -b "$NEW_BRANCH"
          mvn versions:set -DnewVersion="$NEXT_VERSION" -DgenerateBackupPoms=false
          git commit -am "Prepare next development iteration $NEXT_VERSION"

          # Push and create PR
          git push -u origin "$NEW_BRANCH"
          gh pr create --title "Prepare next development iteration $NEXT_VERSION" --body "Automated PR to bump version to $NEXT_VERSION for next development iteration." --base main --head "$NEW_BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hugo-build:
    name: Build Hugo site
    needs: [route, discover]
    if: ${{ needs.discover.outputs.has_hugo == 'true' && needs.route.outputs.run_pages == 'true' }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.123.7
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        working-directory: ./site/mydocs
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        working-directory: ./site/mydocs
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/mydocs/public

  hugo-deploy:
    name: Deploy to GitHub Pages
    needs: [route, discover, hugo-build]
    if: ${{ needs.discover.outputs.has_hugo == 'true' && needs.route.outputs.run_pages == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
